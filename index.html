<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood DJ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #131210;
            --surface: #1a1815;
            --ink: #ece6d9;
            --ink-muted: rgba(236, 230, 217, 0.55);
            --ink-faint: rgba(236, 230, 217, 0.35);
            --line: rgba(236, 230, 217, 0.09);
            --line-strong: rgba(236, 230, 217, 0.18);
            --accent: #c9a87c;
            --accent-soft: rgba(201, 168, 124, 0.14);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--ink);
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            font-weight: 300;
        }

        .container {
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
        }

        .logo-label {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--ink-muted);
            font-weight: 500;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 500;
            font-style: italic;
            letter-spacing: -1px;
            margin-bottom: 14px;
            color: var(--ink);
            line-height: 1.05;
        }

        .subtitle {
            font-size: 14px;
            color: var(--ink-muted);
            margin-bottom: 36px;
            font-weight: 300;
            letter-spacing: 0.1px;
        }

        .input-wrapper { margin-bottom: 12px; }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 2px;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--ink);
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s ease;
            outline: none;
            font-weight: 300;
        }

        input::placeholder { color: var(--ink-faint); }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid var(--ink);
            border-radius: 2px;
            background: var(--ink);
            color: var(--bg);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: transparent;
            color: var(--ink);
        }

        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .result {
            margin-top: 40px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .result.visible { opacity: 1; transform: translateY(0); }

        .result-card {
            border-top: 1px solid var(--line);
            padding: 32px 0 0;
            text-align: left;
        }

        .result-label {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 18px;
        }

        .song-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-style: italic;
            font-weight: 500;
            line-height: 1.25;
            margin-bottom: 4px;
            color: var(--ink);
        }

        .artist-name {
            font-size: 13px;
            color: var(--ink-muted);
            margin-bottom: 24px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .embed-wrapper {
            border-radius: 2px;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--line);
        }

        .embed-wrapper iframe {
            display: block;
            border: none;
            width: 100%;
            height: 80px;
        }

        #spotify-embed-host { width: 100%; min-height: 80px; }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 1px solid rgba(19, 18, 16, 0.3);
            border-top-color: var(--bg);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            color: #d99080;
            font-size: 13px;
            margin-top: 16px;
            font-weight: 300;
        }

        .radio-status {
            font-size: 10px;
            color: var(--ink-faint);
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .up-next {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
        }

        .up-next-title {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .up-next-item {
            font-size: 13px;
            color: var(--ink-muted);
            margin-bottom: 6px;
            font-weight: 300;
        }

        .up-next-item em {
            font-style: normal;
            color: var(--ink);
        }

        .player-controls {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
            margin-top: 22px;
        }

        button.control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--line-strong);
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            letter-spacing: 0;
            transition: border-color 0.2s ease, background 0.2s ease;
            text-transform: none;
            font-size: 12px;
        }

        .control-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
        }

        .control-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .control-btn svg { width: 14px; height: 14px; fill: currentColor; }

        button.control-btn.skip-next {
            width: 40px;
            height: 40px;
        }

        .auth-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .auth-btn {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 8px 16px;
            border-radius: 2px;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--ink-muted);
            font-size: 11px;
            font-family: inherit;
            font-weight: 400;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s ease, border-color 0.2s ease;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            width: auto;
        }

        .auth-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: transparent;
        }

        .auth-btn .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">
            <div class="logo-dot"></div>
            <span class="logo-label">Mood DJ</span>
        </div>

        <h1>What's the vibe?</h1>
        <p class="subtitle">Tell us how you feel and we'll spin a continuous radio for you</p>

        <div class="auth-bar">
            <a id="authBtn" class="auth-btn" href="/login">
                <span class="dot"></span>
                <span id="authLabel">Connect Spotify</span>
            </a>
        </div>

        <div class="input-wrapper">
            <input
                type="text"
                id="moodInput"
                placeholder="melancholic, energetic, dreamy..."
                autocomplete="off"
            >
        </div>

        <button id="generateBtn" onclick="startRadio()">
            <span id="btnText">Start Radio</span>
        </button>

        <div class="result" id="result"></div>

    </div>

    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <script>
        // Empty string = relative URLs, so /generate, /login, etc. resolve
        // to whatever host is serving the page (localhost in dev, Render in prod).
        const API = "";
        const btn = document.getElementById("generateBtn");
        const btnText = document.getElementById("btnText");
        const resultDiv = document.getElementById("result");
        const input = document.getElementById("moodInput");

        let radioActive = false;
        let currentMood = "";
        let searchQuery = "";
        let playedIds = [];
        let localQueue = [];
        let advanceTimer = null;
        let history = [];
        let historyIndex = -1;
        let isLoadingTrack = false;
        let embedController = null;
        let spotifyApiPromise = null;

        resultDiv.addEventListener("click", (e) => {
            if (e.target.closest("#prevBtn")) skipPrevious();
            if (e.target.closest("#nextBtn")) skipNext();
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") startRadio();
        });

        document.addEventListener("keydown", (e) => {
            if (!radioActive) return;
            if (e.key === "ArrowRight") {
                e.preventDefault();
                skipNext();
            }
            if (e.key === "ArrowLeft") {
                e.preventDefault();
                skipPrevious();
            }
        });

        function extractTrackId(url) {
            const match = url.match(/track\/([a-zA-Z0-9]+)/);
            return match ? match[1] : null;
        }

        function getSpotifyApi() {
            if (spotifyApiPromise) return spotifyApiPromise;
            spotifyApiPromise = new Promise(resolve => {
                window.onSpotifyIframeApiReady = resolve;
            });
            return spotifyApiPromise;
        }

        function stopRadio() {
            radioActive = false;
            if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
            if (embedController) { try { embedController.pause(); } catch (_) {} }
        }

        // Tracks position across playback_update events so we know when a
        // track ends (position approaches duration) vs when a new one starts
        // (position resets to ~0).
        let lastPlaybackPosition = 0;
        let advanceRequestedForCurrent = false;

        async function autoplayTrack(trackId) {
            const uri = `spotify:track:${trackId}`;

            // IMPORTANT: don't reset advanceRequestedForCurrent here. If we
            // did, a stale playback_update event for the *old* track (which
            // can still fire briefly after loadUri) would see the flag as
            // false and trigger a second advance — skipping a song.
            // The flag is reset inside the playback_update listener when it
            // detects the position has jumped backwards (new track loaded).
            if (embedController) {
                embedController.loadUri(uri);
                return;
            }

            // First track: create the controller and start playback on ready.
            const API_SDK = await getSpotifyApi();
            const host = document.getElementById("spotify-embed-host");
            if (!host) return;

            advanceRequestedForCurrent = false;
            lastPlaybackPosition = 0;

            API_SDK.createController(host, { uri, width: "100%", height: 80 }, (ctrl) => {
                embedController = ctrl;
                ctrl.addListener("ready", () => { try { ctrl.play(); } catch (_) {} });

                // Auto-advance when the current track actually finishes.
                ctrl.addListener("playback_update", (e) => {
                    const state = e?.data ?? e;
                    if (!state || !state.duration) return;

                    // Detect a track swap: position jumps backwards (loadUri).
                    if (state.position + 2000 < lastPlaybackPosition) {
                        advanceRequestedForCurrent = false;
                    }
                    lastPlaybackPosition = state.position;

                    // Track has reached its end — advance once.
                    const nearEnd = state.position >= state.duration - 750;
                    if (nearEnd && !advanceRequestedForCurrent && radioActive) {
                        advanceRequestedForCurrent = true;
                        if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
                        playNextTrack();
                    }
                });
            });
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
        }

        function buildUpNextHtml() {
            const upNext = localQueue.slice(0, 3);
            if (!upNext.length) return "";
            return `
                <div class="up-next">
                    <div class="up-next-title">Up next</div>
                    ${upNext.map(t => `
                        <div class="up-next-item">${escapeHtml(t.song)} — ${escapeHtml(t.artist)}</div>
                    `).join("")}
                </div>
            `;
        }

        function ensurePlayerCard(data) {
            let card = document.getElementById("playerCard");
            if (card) {
                card.querySelector(".song-title").textContent = data.song;
                card.querySelector(".artist-name").textContent = data.artist;
                card.querySelector(".up-next-container").innerHTML = buildUpNextHtml();
                return;
            }

            resultDiv.innerHTML = `
                <div class="result-card" id="playerCard">
                    <div class="result-label">Now Playing · Radio</div>
                    <h2 class="song-title"></h2>
                    <p class="artist-name"></p>
                    <div class="embed-wrapper">
                        <div id="spotify-embed-host"></div>
                    </div>
                    <div class="player-controls">
                        <button type="button" class="control-btn" id="prevBtn" aria-label="Previous track">
                            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                        </button>
                        <button type="button" class="control-btn skip-next" id="nextBtn" aria-label="Next track">
                            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
                        </button>
                    </div>
                    <div class="up-next-container"></div>
                </div>
            `;
            card = document.getElementById("playerCard");
            card.querySelector(".song-title").textContent = data.song;
            card.querySelector(".artist-name").textContent = data.artist;
            card.querySelector(".up-next-container").innerHTML = buildUpNextHtml();
        }

        function scheduleNext(durationMs) {
            // Fallback only — playback_update is the primary trigger. This
            // timer fires after the track should already have ended, in case
            // the Spotify iframe stops emitting events (backgrounded tab etc).
            if (advanceTimer) clearTimeout(advanceTimer);
            const wait = Math.max((durationMs || 180000) + 5000, 35000);
            advanceTimer = setTimeout(() => {
                if (radioActive && !advanceRequestedForCurrent) playNextTrack();
            }, wait);
        }

        function syncPlayedIds() {
            playedIds = history.map(t => t.track_id || extractTrackId(t.url)).filter(Boolean);
        }

        function updateControls() {
            const prevBtn = document.getElementById("prevBtn");
            const nextBtn = document.getElementById("nextBtn");
            if (prevBtn) prevBtn.disabled = historyIndex <= 0 || isLoadingTrack;
            if (nextBtn) nextBtn.disabled = isLoadingTrack;
        }

        function setCurrentTrack(data, { fromHistory = false } = {}) {
            const trackId = data.track_id || extractTrackId(data.url);
            if (!trackId) throw new Error("No track ID found");

            if (!fromHistory) {
                history = history.slice(0, historyIndex + 1);
                history.push(data);
                historyIndex = history.length - 1;
                syncPlayedIds();
            }

            renderTrack(data, localQueue);
        }

        function renderTrack(data) {
            const trackId = data.track_id || extractTrackId(data.url);
            if (!trackId) throw new Error("No track ID found");

            ensurePlayerCard(data);

            requestAnimationFrame(() => resultDiv.classList.add("visible"));
            updateControls();
            scheduleNext(data.duration_ms);

            autoplayTrack(trackId);
        }

        function skipPrevious() {
            if (!radioActive || historyIndex <= 0 || isLoadingTrack) return;
            if (advanceTimer) clearTimeout(advanceTimer);
            historyIndex -= 1;
            renderTrack(history[historyIndex]);
        }

        async function skipNext() {
            if (!radioActive || isLoadingTrack) return;
            if (advanceTimer) clearTimeout(advanceTimer);

            if (historyIndex < history.length - 1) {
                historyIndex += 1;
                renderTrack(history[historyIndex]);
                return;
            }

            await playNextTrack();
        }

        async function fetchNextFromApi() {
            const params = new URLSearchParams({
                mood: currentMood,
                exclude: playedIds.join(","),
            });
            if (searchQuery) params.set("search_query", searchQuery);

            const res = await fetch(`${API}/radio/next?${params}`);
            if (!res.ok) throw new Error("Radio next failed");
            return res.json();
        }

        async function playNextTrack() {
            if (!radioActive || isLoadingTrack) return;

            isLoadingTrack = true;
            updateControls();

            try {
                let data;
                if (localQueue.length) {
                    data = localQueue.shift();
                } else {
                    data = await fetchNextFromApi();
                    searchQuery = data.search_query || searchQuery;
                    localQueue = (data.queue || []).slice();
                }

                const trackId = data.track_id || extractTrackId(data.url);
                if (!trackId || playedIds.includes(trackId)) {
                    data = await fetchNextFromApi();
                    searchQuery = data.search_query || searchQuery;
                    localQueue = (data.queue || []).slice();
                }

                setCurrentTrack(data);
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML += `<p class="error">Could not load the next track.</p>`;
                stopRadio();
            } finally {
                isLoadingTrack = false;
                updateControls();
            }
        }

        async function checkAuth() {
            try {
                const res = await fetch(`${API}/me`);
                const data = await res.json();
                const btn = document.getElementById("authBtn");
                const label = document.getElementById("authLabel");
                if (data.logged_in) {
                    label.textContent = `${data.name} · Disconnect`;
                    btn.href = `${API}/logout`;
                    btn.title = "Your taste is influencing recommendations";
                } else {
                    label.textContent = "Connect Spotify for personalised picks";
                    btn.href = "/login";
                }
            } catch (_) {}
        }

        // Check auth on load and after OAuth redirect
        checkAuth();
        if (location.search.includes("logged_in=1")) {
            window.history.replaceState({}, "", "/");
        }

        async function startRadio() {
            const mood = input.value.trim();
            if (!mood) return;

            stopRadio();
            radioActive = true;
            currentMood = mood;
            searchQuery = "";
            playedIds = [];
            localQueue = [];
            history = [];
            historyIndex = -1;
            isLoadingTrack = false;
            embedController = null;
            resultDiv.innerHTML = "";
            resultDiv.classList.remove("visible");

            btn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span>Starting radio...';

            try {
                const res = await fetch(`${API}/generate?mood=${encodeURIComponent(mood)}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Generate failed");

                searchQuery = data.search_query;
                localQueue = (data.queue || []).slice();
                setCurrentTrack(data);
            } catch (err) {
                stopRadio();
                const hint = err.message === "Failed to fetch"
                    ? "Cannot reach the backend. Run: uvicorn app:app --reload and open http://127.0.0.1:8000"
                    : "Check your backend or try again.";
                resultDiv.innerHTML = `<p class="error">Something went wrong. ${hint}</p>`;
                resultDiv.classList.add("visible");
                console.error(err);
            } finally {
                btn.disabled = false;
                btnText.textContent = "Restart Radio";
            }
        }
    </script>

</body>
</html>
